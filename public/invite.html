<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="reddably-api-base" content="https://api.claims.sessionably.com">
  <title>Set up your account · Sessionably Claims</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 70"%3E%3Ccircle cx="32" cy="35" r="22" fill="none" stroke="%237E3340" stroke-width="6"/%3E%3Ccircle cx="68" cy="35" r="22" fill="none" stroke="%23B08534" stroke-width="6"/%3E%3C/svg%3E'>

  <!-- Tokens first (authoritative F0 design system), then page styles. -->
  <link rel="stylesheet" href="./app-foundation/styles/tokens.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body>
  <main class="login" role="main">
    <section class="login-card" aria-labelledby="invite-heading">

      <!-- Wordmark -->
      <div class="wordmark" aria-label="Sessionably Claims">
        <svg class="wordmark__mark" viewBox="0 0 100 70" aria-hidden="true" focusable="false">
          <circle cx="32" cy="35" r="24" fill="none" stroke="#7E3340" stroke-width="6"/>
          <circle cx="68" cy="35" r="24" fill="none" stroke="#B08534" stroke-width="6"/>
        </svg>
        <span class="wordmark__text">Sessionably Claims</span>
      </div>

      <h1 class="login-card__heading" id="invite-heading">Set up your account</h1>
      <p class="login-card__subhead">Create your clinician login to join the practice.</p>

      <!-- Shown when the invite token is missing from the URL. -->
      <p class="login-form__error" id="invite-missing" role="alert" hidden>
        Invalid or missing invite link.
      </p>

      <form class="login-form" id="invite-form" novalidate>
        <div class="field">
          <label class="field__label" for="first_name">First name</label>
          <input
            class="field__input"
            type="text"
            id="first_name"
            name="first_name"
            autocomplete="given-name"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="last_name">Last name</label>
          <input
            class="field__input"
            type="text"
            id="last_name"
            name="last_name"
            autocomplete="family-name"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="email">Email</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="confirm_password">Confirm password</label>
          <input
            class="field__input"
            type="password"
            id="confirm_password"
            name="confirm_password"
            autocomplete="new-password"
            required
          >
        </div>

        <p class="login-form__error" id="invite-error" role="alert" aria-live="polite" hidden></p>

        <button class="btn btn--primary" type="submit" id="submit-btn">
          <span class="btn__label">Create account</span>
        </button>
      </form>
    </section>
  </main>

  <!-- Canonical API namespace: all network calls go through window.ReddablyAPI. -->
  <script src="./js/api-client.js"></script>
  <script>
    /* Reddably — clinician invite acceptance.
     *
     * Reads ?invite=<token> from the URL, collects the new clinician's details,
     * and registers them via ReddablyAPI.register (which stores the returned JWT).
     * All network calls go through window.ReddablyAPI — no direct fetch().
     */
    (function (window, document) {
      'use strict';

      var APP_URL = './app/app.html';
      var api = window.ReddablyAPI;

      function getToken() {
        var params = new window.URLSearchParams(window.location.search);
        var t = params.get('invite');
        return t && t.trim() ? t.trim() : null;
      }

      function init() {
        var form = document.getElementById('invite-form');
        var missingEl = document.getElementById('invite-missing');
        var errorEl = document.getElementById('invite-error');
        var submitBtn = document.getElementById('submit-btn');
        var btnLabel = submitBtn && submitBtn.querySelector('.btn__label');
        if (!form || !submitBtn) return;

        var defaultLabel = btnLabel ? btnLabel.textContent : 'Create account';
        var token = getToken();

        // No token → dead-end the form; nothing to register against.
        if (!token) {
          missingEl.hidden = false;
          form.hidden = true;
          return;
        }

        function showError(message) {
          errorEl.textContent = message;
          errorEl.hidden = false;
        }

        function clearError() {
          errorEl.textContent = '';
          errorEl.hidden = true;
        }

        function setLoading(loading) {
          submitBtn.disabled = loading;
          if (btnLabel) btnLabel.textContent = loading ? 'Creating account…' : defaultLabel;
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          clearError();

          var firstName = document.getElementById('first_name').value.trim();
          var lastName = document.getElementById('last_name').value.trim();
          var email = document.getElementById('email').value.trim();
          var password = document.getElementById('password').value;
          var confirmPassword = document.getElementById('confirm_password').value;

          if (!firstName || !lastName || !email || !password || !confirmPassword) {
            showError('Please fill in every field.');
            return;
          }
          if (password !== confirmPassword) {
            showError('Passwords do not match.');
            return;
          }
          if (!api || typeof api.register !== 'function') {
            showError('Unable to create your account right now. Please try again later.');
            return;
          }

          setLoading(true);
          api.register({
            mode: 'invitation',
            invite_token: token,
            first_name: firstName,
            last_name: lastName,
            email: email,
            password: password
          }).then(
            function () {
              // Token is stored by ReddablyAPI.register on success.
              window.location.assign(APP_URL);
            },
            function (err) {
              setLoading(false);
              showError(
                (err && err.message) ||
                'This invitation is invalid, expired, or already used.'
              );
            }
          );
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })(window, document);
  </script>
</body>
</html>
