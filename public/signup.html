<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="reddably-api-base" content="https://api.claims.sessionably.com">
  <title>Create your practice · Sessionably Claims</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 70"%3E%3Ccircle cx="32" cy="35" r="22" fill="none" stroke="%237E3340" stroke-width="6"/%3E%3Ccircle cx="68" cy="35" r="22" fill="none" stroke="%23B08534" stroke-width="6"/%3E%3C/svg%3E'>

  <!-- Tokens first (authoritative F0 design system), then page styles. -->
  <link rel="stylesheet" href="./app-foundation/styles/tokens.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body>
  <main class="login" role="main">
    <section class="login-card" aria-labelledby="signup-heading">

      <!-- Wordmark -->
      <div class="wordmark" aria-label="Sessionably Claims">
        <svg class="wordmark__mark" viewBox="0 0 100 70" aria-hidden="true" focusable="false">
          <circle cx="32" cy="35" r="24" fill="none" stroke="#7E3340" stroke-width="6"/>
          <circle cx="68" cy="35" r="24" fill="none" stroke="#B08534" stroke-width="6"/>
        </svg>
        <span class="wordmark__text">Sessionably Claims</span>
      </div>

      <h1 class="login-card__heading" id="signup-heading">Create your practice</h1>
      <p class="login-card__subhead">Set up your group practice and start managing out-of-network claims.</p>

      <form class="login-form" id="signup-form" novalidate>
        <div class="field">
          <label class="field__label" for="first_name">First name</label>
          <input
            class="field__input"
            type="text"
            id="first_name"
            name="first_name"
            autocomplete="given-name"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="last_name">Last name</label>
          <input
            class="field__input"
            type="text"
            id="last_name"
            name="last_name"
            autocomplete="family-name"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="email">Email</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            autocapitalize="none"
            spellcheck="false"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="practice_name">Practice name</label>
          <input
            class="field__input"
            type="text"
            id="practice_name"
            name="practice_name"
            autocomplete="organization"
            required
          >
        </div>

        <!-- Inline error region — populated from the API response on failure. -->
        <p class="login-form__error" id="signup-error" role="alert" aria-live="polite" hidden></p>

        <button class="btn btn--primary" type="submit" id="submit-btn">
          <span class="btn__label">Create practice</span>
        </button>
      </form>

      <p class="login-card__subhead" style="margin:var(--space-6) 0 0;text-align:center">
        Already have an account?
        <a href="./login.html" style="color:var(--color-primary);font-weight:var(--font-weight-medium)">Log in</a>
      </p>
    </section>
  </main>

  <!-- Canonical API namespace: all network calls go through window.ReddablyAPI. -->
  <script src="./js/api-client.js?v=20260714b"></script>
  <script src="./signup.js"></script>
</body>
</html>
