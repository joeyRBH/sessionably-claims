<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="reddably-api-base" content="https://api.claimsub.com">
  <title>Sign in · Reddably</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 70"%3E%3Ccircle cx="32" cy="35" r="22" fill="none" stroke="%237E3340" stroke-width="6"/%3E%3Ccircle cx="68" cy="35" r="22" fill="none" stroke="%23B08534" stroke-width="6"/%3E%3C/svg%3E'>

  <!-- Tokens first (authoritative F0 design system), then page styles. -->
  <link rel="stylesheet" href="./app-foundation/styles/tokens.css?v=20260704">
  <link rel="stylesheet" href="./login.css?v=20260704">
</head>
<body>
  <main class="login" role="main">
    <section class="login-card" aria-labelledby="login-heading">

      <!-- Wordmark -->
      <div class="wordmark" aria-label="Reddably">
        <svg class="wordmark__mark" viewBox="0 0 100 70" aria-hidden="true" focusable="false">
          <circle cx="32" cy="35" r="24" fill="none" stroke="#7E3340" stroke-width="6"/>
          <circle cx="68" cy="35" r="24" fill="none" stroke="#B08534" stroke-width="6"/>
        </svg>
        <span class="wordmark__text">Reddably</span>
      </div>

      <h1 class="login-card__heading" id="login-heading">Sign in</h1>
      <p class="login-card__subhead">Access your practice dashboard.</p>

      <form class="login-form" id="login-form" novalidate>
        <div class="field">
          <label class="field__label" for="email">Email</label>
          <input
            class="field__input"
            type="email"
            id="email"
            name="email"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          >
        </div>

        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <!-- Single generic error — never reveals which field failed. -->
        <p class="login-form__error" id="login-error" role="alert" aria-live="polite" hidden></p>

        <button class="btn btn--primary" type="submit" id="submit-btn">
          <span class="btn__label">Sign in</span>
        </button>
      </form>
    </section>
  </main>

  <!-- Canonical API namespace: all network calls go through window.ReddablyAPI. -->
  <script src="./js/api-client.js?v=20260704"></script>
  <script src="./login.js?v=20260704"></script>
</body>
</html>
